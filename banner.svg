<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Jet Follower - Animated Banner</title>
  <desc>Animated fighter jet banner for the Jet Follower project</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="titlegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60CFFF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#60CFFF"/>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="flameglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes flypath {
        0%   { transform: translate(-260px, 10px); }
        15%  { transform: translate(-120px, -14px); }
        35%  { transform: translate(30px,  10px); }
        55%  { transform: translate(160px, -10px); }
        75%  { transform: translate(280px,  12px); }
        100% { transform: translate(440px,  0px); }
      }
      @keyframes resetjet {
        0%   { transform: translate(440px, 0px); opacity: 0; }
        1%   { transform: translate(-260px, 10px); opacity: 0; }
        5%   { opacity: 1; }
        100% { transform: translate(-260px, 10px); opacity: 1; }
      }
      @keyframes flicker {
        0%,100% { transform: scaleX(1);   opacity: 1; }
        30%     { transform: scaleX(0.88); opacity: 0.85; }
        65%     { transform: scaleX(1.08); opacity: 0.95; }
      }
      @keyframes smokeA {
        0%   { transform: translate(0,0) scale(1);   opacity: 0.22; }
        100% { transform: translate(-200px, -8px) scale(2.5); opacity: 0; }
      }
      @keyframes smokeB {
        0%   { transform: translate(0,0) scale(1);   opacity: 0.16; }
        100% { transform: translate(-180px, 10px) scale(2.8); opacity: 0; }
      }
      @keyframes shine {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.82; }
      }
      @keyframes subtitleBlink {
        0%,100% { opacity: 0.75; }
        50%     { opacity: 1; }
      }
      @keyframes missile1 {
        0%   { transform: translate(0,0);   opacity: 0; }
        3%   { opacity: 1; }
        100% { transform: translate(-600px, 40px); opacity: 0; }
      }
      @keyframes missile2 {
        0%   { transform: translate(0,0);   opacity: 0; }
        3%   { opacity: 1; }
        100% { transform: translate(-580px,-30px); opacity: 0; }
      }
      @keyframes scanmove {
        0%   { transform: translateY(0); }
        100% { transform: translateY(280px); }
      }

      .jet      { animation: flypath 6s cubic-bezier(0.4,0,0.6,1) infinite,
                             resetjet 0.001s linear 6s 1 forwards; }
      .flame    { animation: flicker 0.16s ease-in-out infinite;
                  transform-origin: 10px 0px; }
      .smokeA   { animation: smokeA 2.6s ease-out infinite; }
      .smokeB   { animation: smokeB 3.2s ease-out infinite 0.9s; }
      .title    { animation: shine 4s ease-in-out infinite; }
      .subtitle { animation: subtitleBlink 3.2s ease-in-out infinite 1s; }
      .m1       { animation: missile1 5.5s ease-in infinite 1.5s; }
      .m2       { animation: missile2 5.8s ease-in infinite 3.8s; }
      .scan     { animation: scanmove 3s linear infinite; opacity: 0.025; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="55"  cy="22" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="145" cy="48" r="1.1" fill="#9cf" opacity="0.5"/>
  <circle cx="240" cy="18" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="370" cy="35" r="1.0" fill="#fff" opacity="0.55"/>
  <circle cx="510" cy="20" r="0.9" fill="#9cf" opacity="0.6"/>
  <circle cx="640" cy="44" r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="760" cy="16" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="820" cy="55" r="0.9" fill="#9cf" opacity="0.45"/>
  <circle cx="100" cy="65" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="680" cy="62" r="0.8" fill="#fff" opacity="0.55"/>
  <circle cx="25"  cy="85" r="0.9" fill="#9cf" opacity="0.4"/>
  <circle cx="840" cy="92" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="460" cy="55" r="0.8" fill="#fff" opacity="0.4"/>

  <!-- Horizon glow -->
  <ellipse cx="430" cy="280" rx="380" ry="70" fill="#004488" opacity="0.1"/>

  <!-- Smoke trails (world-space, independent of jet) -->
  <g class="smokeA" style="transform-origin: 430px 152px">
    <ellipse cx="430" cy="152" rx="28" ry="9" fill="#8899BB" opacity="0.22"/>
  </g>
  <g class="smokeB" style="transform-origin: 435px 156px">
    <ellipse cx="435" cy="156" rx="22" ry="7" fill="#7788AA" opacity="0.16"/>
  </g>

  <!-- Missiles -->
  <g class="m1" style="transform-origin: 620px 148px">
    <line x1="560" y1="148" x2="620" y2="146" stroke="#00CCFF" stroke-width="1.8" opacity="0.9"/>
    <circle cx="620" cy="147" r="2.5" fill="#00EEFF"/>
    <line x1="480" y1="150" x2="560" y2="148" stroke="#0077BB" stroke-width="0.9" opacity="0.35"/>
  </g>
  <g class="m2" style="transform-origin: 640px 155px">
    <line x1="580" y1="155" x2="640" y2="153" stroke="#00CCFF" stroke-width="1.8" opacity="0.8"/>
    <circle cx="640" cy="154" r="2.5" fill="#00EEFF"/>
    <line x1="500" y1="157" x2="580" y2="155" stroke="#0077BB" stroke-width="0.9" opacity="0.28"/>
  </g>

  <!-- JET (all parts move together) -->
  <g class="jet" style="transform-origin: 430px 150px">

    <!-- Afterburner flame -->
    <g class="flame" style="transform-origin: 340px 150px" filter="url(#flameglow)">
      <!-- Outer cone (orange-red) -->
      <polygon points="340,143 296,132 270,150 296,168 340,157" fill="#FF5500" opacity="0.92"/>
      <!-- Inner cone (blue-white) -->
      <polygon points="338,146 308,143 293,150 308,157 338,154" fill="#88DDFF" opacity="0.97"/>
      <!-- Hot core -->
      <polygon points="337,148 318,147 310,150 318,153 337,152" fill="#EEFFFF" opacity="1"/>
    </g>

    <!-- Wings (lower / upper delta) -->
    <polygon points="358,150 322,180 316,172 328,150" fill="#8899A8"/>
    <polygon points="358,150 322,120 316,128 328,150" fill="#99AABB"/>
    <!-- Wing highlight -->
    <line x1="358" y1="150" x2="322" y2="120" stroke="#C0D0E0" stroke-width="0.9" opacity="0.6"/>

    <!-- Fuselage body -->
    <polygon points="430,150 375,140 316,142 300,150 316,158 375,160" fill="#B0C0D0"/>
    <!-- Fuselage center line (shadow) -->
    <line x1="316" y1="150" x2="430" y2="150" stroke="#7888A0" stroke-width="0.6" opacity="0.55"/>

    <!-- Cockpit canopy -->
    <polygon points="420,147 403,138 380,140 380,150 420,150" fill="#162840" opacity="0.96"/>
    <polygon points="418,148 400,140 384,141 384,150 418,150" fill="#1C3A56" opacity="0.55"/>
    <!-- Canopy glint -->
    <line x1="386" y1="141" x2="415" y2="141" stroke="#7ABEEE" stroke-width="0.9" opacity="0.45"/>

    <!-- Nose -->
    <polygon points="430,150 436,150 476,150" fill="#8FAAB8"/>
    <line x1="430" y1="148" x2="476" y2="150" stroke="#A8C0CC" stroke-width="0.8"/>

    <!-- Tail fins -->
    <polygon points="316,150 310,139 324,143" fill="#7A8C9A"/>
    <polygon points="316,150 310,161 324,157" fill="#7A8C9A"/>

    <!-- Engine intake -->
    <ellipse cx="332" cy="150" rx="6" ry="8" fill="#111E28" opacity="0.92"/>
  </g>

  <!-- Scanline overlay -->
  <rect class="scan" width="860" height="4" fill="#fff" opacity="0.025"/>

  <!-- === TEXT (static, centered) === -->

  <!-- Title -->
  <text class="title"
    x="430" y="90"
    font-family="'Courier New', Courier, monospace"
    font-weight="700"
    font-size="54"
    text-anchor="middle"
    letter-spacing="8"
    fill="url(#titlegrad)"
    filter="url(#softglow)">JET FOLLOWER</text>

  <!-- Subtitle -->
  <text class="subtitle"
    x="430" y="120"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="13"
    text-anchor="middle"
    letter-spacing="3"
    fill="#60AADD"
    opacity="0.85">PHYSICS-DRIVEN  ✦  MULTI-MONITOR  ✦  COMBAT AI</text>

  <!-- Bottom bar -->
  <rect x="0" y="250" width="860" height="30" fill="#030810" opacity="0.75"/>
  <text
    x="430" y="269"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    text-anchor="middle"
    letter-spacing="2"
    fill="#2E5F8A"
    opacity="0.85">PYTHON · TKINTER · 60 FPS · ADVANCED MANEUVERS · DUAL-WEAPON SYSTEM</text>

  <!-- HUD corner brackets -->
  <g stroke="#1A4A80" stroke-width="1.4" fill="none" opacity="0.65">
    <path d="M10,10 L10,32 M10,10 L32,10"/>
    <path d="M850,10 L850,32 M850,10 L828,10"/>
    <path d="M10,270 L10,248 M10,270 L32,270"/>
    <path d="M850,270 L850,248 M850,270 L828,270"/>
  </g>
</svg>
